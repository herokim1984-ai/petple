<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58B4E1"/>
      <stop offset="100%" style="stop-color:#4A9BD9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E9967A"/>
      <stop offset="100%" style="stop-color:#DEB887"/>
    </linearGradient>
  </defs>

  <!-- 배경 그라데이션 -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- 장식 원 -->
  <circle cx="120" cy="80" r="120" fill="white" opacity="0.06"/>
  <circle cx="900" cy="420" r="160" fill="white" opacity="0.06"/>
  <circle cx="850" cy="100" r="80" fill="white" opacity="0.04"/>

  <!-- 왼쪽: 텍스트 영역 -->
  <text x="80" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white">Petple</text>
  <text x="80" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="white" opacity="0.9">우리 아이 친구 만들기</text>
  <text x="80" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="white" opacity="0.7">반려동물 매칭 · 산책 모임 · 펫 스토리 · 채팅</text>

  <!-- 기능 뱃지들 -->
  <rect x="80" y="320" width="120" height="36" rx="18" fill="white" opacity="0.2"/>
  <text x="140" y="344" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white">🐾 매칭</text>

  <rect x="215" y="320" width="120" height="36" rx="18" fill="white" opacity="0.2"/>
  <text x="275" y="344" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white">💬 채팅</text>

  <rect x="350" y="320" width="120" height="36" rx="18" fill="white" opacity="0.2"/>
  <text x="410" y="344" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white">📸 스토리</text>

  <!-- 하단 태그라인 -->
  <text x="80" y="430" font-family="system-ui, sans-serif" font-size="16" fill="white" opacity="0.6">무료 다운로드 · 지금 바로 시작하세요</text>

  <!-- 오른쪽: 폰 목업 -->
  <g transform="translate(680,40)">
    <!-- 폰 프레임 -->
    <rect x="0" y="0" width="260" height="460" rx="28" fill="#1a1a2e" stroke="white" stroke-width="2" stroke-opacity="0.2"/>
    <rect x="8" y="8" width="244" height="444" rx="22" fill="#F0F8FF"/>

    <!-- 폰 내부 - 미니 앱 UI -->
    <!-- 헤더 -->
    <rect x="8" y="8" width="244" height="44" rx="22 22 0 0" fill="white"/>
    <text x="28" y="36" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#58B4E1">🐾 Petple</text>

    <!-- 카드 -->
    <rect x="20" y="60" width="220" height="280" rx="16" fill="white"/>
    <!-- 카드 이미지 영역 -->
    <rect x="20" y="60" width="220" height="180" rx="16 16 0 0" fill="#DBEAFE"/>
    <g transform="translate(130,140)">
      <ellipse cx="0" cy="5" rx="20" ry="18" fill="#58B4E1" opacity="0.3"/>
      <circle cx="-20" cy="-10" r="9" fill="#58B4E1" opacity="0.3"/>
      <circle cx="-7" cy="-17" r="9" fill="#58B4E1" opacity="0.3"/>
      <circle cx="8" cy="-17" r="9" fill="#58B4E1" opacity="0.3"/>
      <circle cx="22" cy="-10" r="9" fill="#58B4E1" opacity="0.3"/>
    </g>
    <!-- 카드 텍스트 -->
    <rect x="28" y="250" width="100" height="10" rx="5" fill="#374151" opacity="0.6"/>
    <rect x="28" y="268" width="160" height="8" rx="4" fill="#9CA3AF" opacity="0.4"/>
    <rect x="28" y="284" width="80" height="8" rx="4" fill="#9CA3AF" opacity="0.3"/>
    <!-- 카드 태그 -->
    <rect x="28" y="305" width="50" height="18" rx="9" fill="#E0F2FE"/>
    <rect x="84" y="305" width="50" height="18" rx="9" fill="#E0F2FE"/>
    <rect x="140" y="305" width="50" height="18" rx="9" fill="#E0F2FE"/>

    <!-- 하단 버튼들 -->
    <circle cx="90" cy="380" r="24" fill="none" stroke="#ef4444" stroke-width="2.5"/>
    <text x="90" y="386" text-anchor="middle" font-size="16">✕</text>
    <circle cx="170" cy="380" r="24" fill="none" stroke="#58B4E1" stroke-width="2.5"/>
    <text x="170" y="386" text-anchor="middle" font-size="16">🐾</text>

    <!-- 하단 네비 -->
    <rect x="8" y="410" width="244" height="42" rx="0 0 22 22" fill="white"/>
    <circle cx="56" cy="431" r="4" fill="#58B4E1"/>
    <circle cx="100" cy="431" r="4" fill="#ccc"/>
    <circle cx="144" cy="431" r="4" fill="#ccc"/>
    <circle cx="188" cy="431" r="4" fill="#ccc"/>
  </g>
</svg>
