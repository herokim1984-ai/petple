<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0F2FE"/>
      <stop offset="50%" style="stop-color:#F0F8FF"/>
      <stop offset="100%" style="stop-color:#DBEAFE"/>
    </linearGradient>
    <linearGradient id="logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58B4E1"/>
      <stop offset="100%" style="stop-color:#4A9BD9"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E9967A"/>
      <stop offset="100%" style="stop-color:#DEB887"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 카드 -->
  <rect x="240" y="60" width="720" height="510" rx="32" fill="white" filter="url(#shadow)"/>

  <!-- 발자국 로고 -->
  <g transform="translate(600,200)">
    <ellipse cx="0" cy="8" rx="32" ry="28" fill="url(#logo)"/>
    <circle cx="-34" cy="-18" r="14" fill="url(#logo)"/>
    <circle cx="-12" cy="-28" r="14" fill="url(#logo)"/>
    <circle cx="14" cy="-28" r="14" fill="url(#logo)"/>
    <circle cx="36" cy="-18" r="14" fill="url(#logo)"/>
    <!-- 하트 -->
    <g transform="translate(0,46) scale(0.5)">
      <path d="M0,-6 C-3,-10 -9,-10 -9,-5 C-9,-1 -3,4 0,8 C3,4 9,-1 9,-5 C9,-10 3,-10 0,-6Z" fill="url(#heart)" opacity="0.9"/>
    </g>
  </g>

  <!-- 텍스트 -->
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#58B4E1">Petple</text>
  <text x="600" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#6B8BA4">우리 아이 친구 만들기</text>
  <text x="600" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#9DB5C8">반려동물 매칭 · 산책 모임 · 펫 스토리</text>

  <!-- 하단 URL -->
  <text x="600" y="500" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#B0C4D8">petple.vercel.app</text>

  <!-- 데코 발자국들 -->
  <g opacity="0.08" fill="#58B4E1">
    <circle cx="100" cy="100" r="15"/><circle cx="80" cy="75" r="8"/><circle cx="95" cy="65" r="8"/><circle cx="112" cy="65" r="8"/><circle cx="125" cy="75" r="8"/>
    <circle cx="1100" cy="530" r="15"/><circle cx="1080" cy="505" r="8"/><circle cx="1095" cy="495" r="8"/><circle cx="1112" cy="495" r="8"/><circle cx="1125" cy="505" r="8"/>
    <circle cx="180" cy="500" r="12"/><circle cx="164" cy="480" r="6"/><circle cx="175" cy="472" r="6"/><circle cx="188" cy="472" r="6"/><circle cx="198" cy="480" r="6"/>
    <circle cx="1020" cy="120" r="12"/><circle cx="1004" cy="100" r="6"/><circle cx="1015" cy="92" r="6"/><circle cx="1028" cy="92" r="6"/><circle cx="1038" cy="100" r="6"/>
  </g>
</svg>
